# fly.toml g\u00e9n\u00e9r\u00e9 pour evoliz-rebill
# Apr\u00e8s `fly launch --no-deploy`, ajuste app/region si Fly t'en propose d'autres.

app = "evoliz-rebill"
primary_region = "cdg"  # Paris

[build]

[env]
  # DB_PATH est d\u00e9j\u00e0 d\u00e9fini dans le Dockerfile (/data/rebill.db)

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
