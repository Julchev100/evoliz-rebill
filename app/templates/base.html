<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>{% block title %}evoliz-rebill{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: -apple-system, Segoe UI, sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: 0.2rem; }
    nav a { margin-right: 1rem; }
    .client-block { border: 1px solid #ddd; border-radius: 6px; margin: 1rem 0; padding: 1rem; }
    .client-head { display: flex; justify-content: space-between; align-items: baseline; }
    .client-head h2 { margin: 0; font-size: 1.1rem; }
    .total { color: #555; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.6rem; font-size: 0.92rem; }
    th, td { text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #fafafa; font-weight: 600; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    button { background: #1f6feb; color: white; border: 0; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1858c4; }
    .error { background: #fee; border: 1px solid #f99; padding: 0.8rem; border-radius: 6px; color: #900; }
    .ok { background: #efe; border: 1px solid #9c9; padding: 0.6rem; border-radius: 6px; margin: 0.3rem 0; }
    .ko { background: #fee; border: 1px solid #f99; padding: 0.6rem; border-radius: 6px; margin: 0.3rem 0; }
  </style>
</head>
<body>
  <h1>evoliz-rebill</h1>
  <nav>
    <a href="/">Achats à refacturer</a>
    <a href="/history">Historique</a>
    <a href="/settings">Paramètres API</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
